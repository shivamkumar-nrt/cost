<section class="db-page">
  <header class="db-header">
    <div class="header-left">
      <h2>Location Specific Cost Database</h2>
    </div>
    <div class="header-right">
      <button class="ai-btn" type="button"><span class="icon">🪄</span> AI Assistant</button>
      <button class="analytics-btn" type="button"><span class="icon">📈</span> Analytics View</button>
    </div>
  </header>

  <div class="toolbar-row">
    <button class="ghost-btn" type="button" (click)="openImportModal()"><span class="icon">📥</span> Import
      data</button>

    <div class="filter-group">
      <div class="select-with-icon">
        <!-- Assuming Year might become a select later or staying as input, 
             if it's just a display input, we might need a different trigger, 
             but usually, these should all be selects or inputs that trigger updates -->
        <input type="text" [(ngModel)]="selectedYear" (ngModelChange)="updateFilters()" placeholder="Year">
        <span class="calendar-icon">📅</span>
      </div>

      <div class="select-with-label">
        <label>Location</label>
        <select [(ngModel)]="selectedLocation" (ngModelChange)="updateFilters()">
          <option *ngFor="let location of locations" [value]="location">{{ location }}</option>
        </select>
      </div>

      <div class="select-with-label">
        <label>Vendor</label>
        <select [(ngModel)]="selectedVendor" (ngModelChange)="updateFilters()">
          <option *ngFor="let vendor of vendors" [value]="vendor">{{ vendor }}</option>
        </select>
      </div>

    </div>

    <div class="toolbar-actions">
      <div class="icon-actions">
        <button type="button" class="icon-only-btn" title="Save">💾</button>
        <button type="button" class="icon-only-btn" title="Delete" (click)="deleteSelectedRows()">🗑️</button>
        <button type="button" class="icon-only-btn active" title="Sort By" (click)="sortByRate()">
          <span class="sort-icon-ui">📊</span>
        </button>
        <button type="button" class="icon-only-btn" title="Edit" (click)="editSelectedRows()">✏️</button>
      </div>

      <button type="button" class="ghost-btn"><span class="icon">📤</span> Export data</button>
      <button type="button" class="add-btn" (click)="addRowToActiveTab()">+ Add</button>
      <button type="button" class="ghost-btn" (click)="openFilterSidebar()">
        <span class="icon">≡</span> Filter By
      </button>
    </div>
  </div>

  <nav class="tabs">
    <button type="button" [class.active]="activeTab === 'raw-material'" (click)="setTab('raw-material')">
      Raw Material Database
    </button>
    <button type="button" [class.active]="activeTab === 'location-specific'" (click)="setTab('location-specific')">
      Location Specific Database
    </button>
    <button type="button" [class.active]="activeTab === 'project-specific'" (click)="setTab('project-specific')">
      Project Specific Database
    </button>
  </nav>

  <!-- <div class="tab-sub-header">
    <div class="view-by">View By <strong>Layout 01</strong> <span class="chevron">▼</span></div>
  </div> -->

  <div class="tab-body">
    <app-raw-material-database #rawTab *ngIf="activeTab === 'raw-material'" [filterYear]="appliedYear"
      [filterLocation]="appliedLocation" [filterVendor]="appliedVendor" [filterCategory]="appliedCategory"
      [filterKeyword]="appliedKeyword" [filterToken]="filterToken" [sortDirection]="sortDirection"
      [sortToken]="sortToken" [categories]="categoryOptions"></app-raw-material-database>
    <app-location-specific-database #locationTab *ngIf="activeTab === 'location-specific'" [filterYear]="appliedYear"
      [filterLocation]="appliedLocation" [filterVendor]="appliedVendor" [filterCategory]="appliedCategory"
      [filterKeyword]="appliedKeyword" [filterToken]="filterToken" [sortDirection]="sortDirection"
      [sortToken]="sortToken" [categories]="categoryOptions"></app-location-specific-database>
    <app-project-specific-database #projectTab *ngIf="activeTab === 'project-specific'" [filterYear]="appliedYear"
      [filterLocation]="appliedLocation" [filterVendor]="appliedVendor" [filterCategory]="appliedCategory"
      [filterKeyword]="appliedKeyword" [filterToken]="filterToken" [sortDirection]="sortDirection"
      [sortToken]="sortToken" [categories]="categoryOptions"></app-project-specific-database>
  </div>

  <div class="filter-overlay" *ngIf="isFilterSidebarOpen" (click)="closeFilterSidebar()"></div>
  <aside class="filter-sidebar" [class.open]="isFilterSidebarOpen">

    <!-- Sidebar Header -->
    <div class="sidebar-head">
      <h3>Filter By</h3>
      <button type="button" class="close-sidebar-btn" (click)="closeFilterSidebar()">✕</button>
    </div>

    <!-- Sidebar Body -->
    <div class="sidebar-content">

      <!-- Category Select -->
      <div class="filter-field">
        <label>Select via category</label>
        <app-autocomplete [(ngModel)]="selectedCategory" [options]="categoryOptions" placeholder="Category Select"
          width="100%"></app-autocomplete>
      </div>

      <!-- Sub-Category Select -->
      <div class="filter-field">
        <label>Select via sub - category</label>
        <app-autocomplete [(ngModel)]="selectedSubCategory" [options]="subCategories" placeholder="Category Select"
          width="100%"></app-autocomplete>
      </div>

      <!-- Item Name Select -->
      <div class="filter-field">
        <label>Select specific Item Name</label>
        <app-autocomplete [(ngModel)]="selectedItemName" [options]="itemNames" placeholder="Item Name"
          width="100%"></app-autocomplete>
      </div>

      <!-- UoM -->
      <div class="filter-field">
        <label>UoM</label>
        <div class="uom-toggle">
          <button type="button" [class.uom-active]="uomMode === 'set'" (click)="uomMode = 'set'">Set Type</button>
          <button type="button" [class.uom-active]="uomMode === 'no'" (click)="uomMode = 'no'">No. Type</button>
        </div>
        <div class="uom-chips">
          <button type="button" *ngFor="let uom of uomOptions" class="uom-chip"
            [class.selected]="selectedUoms.includes(uom)" (click)="toggleUom(uom)">{{ uom }}</button>
        </div>
      </div>

      <!-- Project Type -->
      <div class="filter-field">
        <label>Project Type</label>
        <div class="radio-group-filter">
          <label class="radio-option">
            <input type="radio" name="projectType" [(ngModel)]="projectType" value="within" />
            <span class="radio-dot"></span>
            Within India
          </label>
          <label class="radio-option">
            <input type="radio" name="projectType" [(ngModel)]="projectType" value="outside" />
            <span class="radio-dot"></span>
            Outside India
          </label>
        </div>
      </div>

      <!-- Unit Rate Range -->
      <div class="filter-field">
        <label>Unit Rate Range ( in ₹)</label>
        <div class="range-slider-wrap">
          <input type="range" class="range-slider" [min]="1000" [max]="1000000" [step]="1000" [(ngModel)]="minRate" />
          <div class="range-labels">
            <span>₹{{ minRate | number }}</span>
            <span>₹10,00,000</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button type="button" class="apply-btn" (click)="applyFilters()">Apply Now</button>
      <button type="button" class="reset-btn" (click)="clearSidebarFilters()">Reset</button>
    </div>

  </aside>

  <app-import-modal *ngIf="showImportModal" (close)="closeImportModal()"
    (upload)="handleImport($event)"></app-import-modal>
</section>
